# Continuous integration: build + test + coverage gate, and a formatting gate.
#
# Build bar: `dotnet build gclo.slnx -p:Platform=x64` must produce ZERO warnings,
# which -warnaserror enforces (this also fails the build on NuGetAudit
# vulnerability warnings, so known-vulnerable packages break CI).
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    name: Build and test (x64)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Build solution (x64, warnings as errors)
        run: dotnet build gclo.slnx -p:Platform=x64 -warnaserror

      # coverage.runsettings scopes collection to the three library assemblies and
      # excludes source-generated code and the [ExcludeFromCodeCoverage] native/
      # network adapters (LibGit2GitClient, OctokitGateway). gclo.Engine.Tests
      # exercises gclo.Engine and gclo.ViewModels; gclo.Cli.Tests covers the CLI
      # (its assembly is 'gclo'). Both write into TestResults; the gate reads all.
      - name: Run engine and view-model tests with coverage
        run: dotnet test gclo.Engine.Tests --settings coverage.runsettings --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Run CLI tests with coverage
        run: dotnet test gclo.Cli.Tests --settings coverage.runsettings --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Enforce 100% line coverage (Engine, ViewModels, Cli)
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path TestResults -Recurse -Filter coverage.cobertura.xml
          if (-not $files) {
            Write-Error 'No coverage.cobertura.xml found under TestResults. Did the coverage collector run?'
            exit 1
          }
          # Merge every collected report: the two test projects each emit their own,
          # and a package's covered lines can be split across them.
          # The CLI's assembly (and thus its coverage package) is 'gclo' — it ships as gclo.exe.
          $required = @('gclo.Engine', 'gclo.ViewModels', 'gclo')
          $failed = $false
          foreach ($name in $required) {
            $rates = foreach ($f in $files) {
              [xml]$doc = Get-Content -LiteralPath $f.FullName
              $pkg = @($doc.coverage.packages.package) | Where-Object { $_.name -eq $name }
              if ($pkg) { [double]::Parse($pkg.'line-rate', [System.Globalization.CultureInfo]::InvariantCulture) }
            }
            if (-not $rates) {
              Write-Error "Package '$name' not found in any coverage report."
              $failed = $true
              continue
            }
            # The report with the most coverage for this package is authoritative.
            $best = ($rates | Measure-Object -Maximum).Maximum
            $percent = [math]::Round($best * 100, 2)
            Write-Host "$name line coverage: $percent% (required 100%)"
            if ($best -lt 1.0) {
              Write-Error "Coverage gate FAILED: $name line-rate $best is below the required 1.00."
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
          Write-Host 'Coverage gate passed: all measured assemblies at 100%.'

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-cobertura
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

  ui-tests:
    # End-to-end FlaUI/UIA tests against the real gclo.exe. Not in the branch
    # ruleset's required checks yet: hosted-runner UIA is new here, so this job
    # earns required status by proving itself stable first.
    name: UI end-to-end tests (x64)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      # Self-contained Windows App SDK: hosted runners do not have the runtime
      # installed. The output path is the same one AppSession resolves by default.
      - name: Build app (unpackaged, self-contained Windows App SDK)
        run: dotnet build gclo/gclo.csproj -p:Platform=x64 -p:WindowsPackageType=None -p:WindowsAppSDKSelfContained=true

      - name: Run UI tests
        run: dotnet test gclo.UiTests/gclo.UiTests.csproj

  format:
    name: Format (style gate)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore gclo.slnx

      # Kept at --severity error so this gates real issues (analyzer errors and
      # error-severity style rules), not whitespace preferences.
      - name: Verify formatting
        run: dotnet format gclo.slnx --verify-no-changes --severity error
