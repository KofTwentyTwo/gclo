# Continuous integration: build + test + coverage gate, and a formatting gate.
#
# Build bar: `dotnet build gclo.slnx -p:Platform=x64` must produce ZERO warnings,
# which -warnaserror enforces (this also fails the build on NuGetAudit
# vulnerability warnings, so known-vulnerable packages break CI).
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-test:
    name: Build and test (x64)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build solution (x64, warnings as errors)
        run: dotnet build gclo.slnx -p:Platform=x64 -warnaserror

      - name: Run tests with coverage
        # The solution build above ran with the x64 *solution* platform, but
        # gclo.Engine.Tests is an AnyCPU-only test project, so exactly where its
        # outputs land depends on how the .slnx maps solution platform -> project
        # platform. Rather than couple `dotnet test --no-build` to that mapping,
        # rebuild just the test project (plus gclo.Engine) with its default
        # AnyCPU platform here - it is a small, deterministic incremental build.
        run: dotnet test gclo.Engine.Tests --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Enforce gclo.Engine line coverage >= 60%
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path TestResults -Recurse -Filter coverage.cobertura.xml
          if (-not $files) {
            Write-Error 'No coverage.cobertura.xml found under TestResults. Did the coverage collector run?'
            exit 1
          }
          $file = $files | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          Write-Host "Parsing coverage report: $($file.FullName)"
          [xml]$cobertura = Get-Content -LiteralPath $file.FullName
          $packages = @($cobertura.coverage.packages.package)
          $engine = $packages | Where-Object { $_.name -eq 'gclo.Engine' }
          if (-not $engine) {
            $names = ($packages | ForEach-Object { $_.name }) -join ', '
            Write-Error "Package 'gclo.Engine' not found in the coverage report. Packages present: $names"
            exit 1
          }
          $lineRate = [double]::Parse($engine.'line-rate', [System.Globalization.CultureInfo]::InvariantCulture)
          $percent = [math]::Round($lineRate * 100, 2)
          Write-Host "gclo.Engine line coverage: $percent% (line-rate $lineRate, required >= 0.60)"
          if ($lineRate -lt 0.60) {
            Write-Error "Coverage gate FAILED: gclo.Engine line-rate $lineRate is below the required 0.60."
            exit 1
          }
          Write-Host 'Coverage gate passed.'

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-cobertura
          path: TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

  ui-tests:
    # End-to-end FlaUI/UIA tests against the real gclo.exe. Not in the branch
    # ruleset's required checks yet: hosted-runner UIA is new here, so this job
    # earns required status by proving itself stable first.
    name: UI end-to-end tests (x64)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      # Self-contained Windows App SDK: hosted runners do not have the runtime
      # installed. The output path is the same one AppSession resolves by default.
      - name: Build app (unpackaged, self-contained Windows App SDK)
        run: dotnet build gclo/gclo.csproj -p:Platform=x64 -p:WindowsPackageType=None -p:WindowsAppSDKSelfContained=true

      - name: Run UI tests
        run: dotnet test gclo.UiTests/gclo.UiTests.csproj

  format:
    name: Format (style gate)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore gclo.slnx

      # Kept at --severity error so this gates real issues (analyzer errors and
      # error-severity style rules), not whitespace preferences.
      - name: Verify formatting
        run: dotnet format gclo.slnx --verify-no-changes --severity error
