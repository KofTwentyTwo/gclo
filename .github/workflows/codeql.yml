# CodeQL static analysis for C#.
#
# C# is a compiled language, so CodeQL needs a real build. We use build-mode
# "manual" and run the same x64 solution build the CI workflow uses (without
# -warnaserror - the CI workflow already gates warnings; this workflow's job is
# security analysis, and it should still scan code that has a pending warning).
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan (Mondays 06:30 UTC) so new CodeQL queries run even when the
    # code has not changed.
    - cron: '30 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      # Required for github/codeql-action to upload scan results.
      security-events: write
      # Required to fetch public CodeQL packs.
      packages: read
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      - name: Build solution (x64)
        run: dotnet build gclo.slnx -p:Platform=x64

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:csharp'
