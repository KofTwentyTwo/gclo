<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- gclo mark, rebuilt as true vector (the original brand export was a raster).
       Transparent outside the rounded tile so the host background shows through. -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A2B4D" />
      <stop offset="1" stop-color="#0C1836" />
    </linearGradient>
  </defs>

  <rect x="48" y="44" width="416" height="416" rx="104" fill="url(#tile)" />

  <!-- Three descending chevrons: rounded, white, centered on x=256. -->
  <g fill="none" stroke="#FDFDFD" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="172,114 256,168 340,114" />
    <polyline points="172,180 256,234 340,180" />
    <polyline points="172,246 256,300 340,246" />
  </g>

  <!-- 2x3 grid of rounded squares the chevrons flow into. -->
  <g fill="#FDFDFD">
    <rect x="184" y="330" width="40" height="40" rx="12" />
    <rect x="236" y="330" width="40" height="40" rx="12" />
    <rect x="288" y="330" width="40" height="40" rx="12" />
    <rect x="184" y="382" width="40" height="40" rx="12" />
    <rect x="236" y="382" width="40" height="40" rx="12" />
    <rect x="288" y="382" width="40" height="40" rx="12" />
  </g>
</svg>
